name: athenaapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  fl_chart: ^0.66.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.0
  provider: ^6.0.5
  intl: ^0.20.2
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# Configuração do Ícone (Deve começar na margem esquerda)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icon.png"
  adaptive_icon_background: "#F2F2F7"

flutter:
  uses-material-design: true 
  assets:
    - lib/assets/icon.png
